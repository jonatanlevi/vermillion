<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="theme-color" content="#0A0A0A" />
    <title>VerMillion</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html {
        background-color: #0A0A0A;
        height: 100vh; height: 100dvh;
        overflow: hidden;
        overscroll-behavior: none;
      }
      body {
        background-color: #0A0A0A;
        height: 100vh; height: 100dvh;
        overflow: hidden;
        overscroll-behavior: none;
        margin: 0; padding: 0;
      }
      #root {
        height: 100vh; height: 100dvh;
        display: flex; flex-direction: column;
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      @keyframes vm-spin { to { transform: rotate(360deg); } }
      #vm-loader {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #0A0A0A; display: flex; align-items: center;
        justify-content: center; z-index: 9999; pointer-events: none;
      }
      #vm-loader-ring {
        width: 44px; height: 44px;
        border: 3px solid rgba(192,57,43,0.25);
        border-top-color: #C0392B;
        border-radius: 50%;
        animation: vm-spin 0.9s linear infinite;
      }
    </style>
    %%EXPO_HEAD%%
  </head>
  <body>
    <div id="root">
      <div id="vm-loader"><div id="vm-loader-ring"></div></div>
    </div>
  </body>
</html>
